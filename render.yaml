services:
  # ── Ana Backend + Web Admin Panel ──
  - type: web
    name: saha-satis-planlama
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "18"
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_OgpXnhek8Pu1@ep-shy-salad-alaaaj7c-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require"

  # ── Mobil App'in Web Sürümü (iPhone + tarayıcı erişimi için) ──
  - type: web
    name: saha-satis-mobile-web
    runtime: static
    buildCommand: cd mobile && npm install --legacy-peer-deps && npx expo export --platform web --output-dir web-build
    staticPublishPath: ./mobile/web-build
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
